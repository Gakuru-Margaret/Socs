services:
  - type: web
    name: socs
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES
        value: 12h
      - key: FRONTEND_URL
        sync: false
